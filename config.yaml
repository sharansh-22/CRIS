# --- Data ---
data:
  synthetic_orderbook:
    n_levels: 5           # number of price levels each side of the book
    poisson_lambda: 10    # order arrival rate per minute
    depth_decay: 0.7      # exponential decay factor for depth away from best
    output_dir: data/synthetic_orderbook/
  event_windows:
    flash_crash_2010:
      ticker: SPY
      start: "2010-05-01"
      end: "2010-05-15"
    covid_2020:
      ticker: SPY
      start: "2020-02-01"
      end: "2020-03-31"
    china_2015:
      ticker: SPY
      start: "2015-06-01"
      end: "2016-01-31"



